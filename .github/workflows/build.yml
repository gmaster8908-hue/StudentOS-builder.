name: Build Studentos

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Factory Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debian-archive-keyring squashfs-tools xorriso mtools grub-pc-bin grub-efi-amd64-bin syslinux-utils syslinux-common

      - name: Initialize Debian Bookworm Base
        run: |
          cd build-env
          sudo lb config -d bookworm \
                         --mode debian \
                         --system live \
                         --architectures amd64 \
                         --binary-images iso-hybrid \
                         --bootloader grub-efi

      - name: Write the Software Manifest
        run: |
          cd build-env
          sudo mkdir -p config/package-lists
          cat << 'EOF' | sudo tee config/package-lists/studentos.list.chroot
          grub-pc-bin
          grub-efi-amd64-bin
          mtools
          syslinux-utils
          syslinux-common
          firmware-linux-free
          live-boot
          live-config
          systemd-sysv
          network-manager
          xserver-xorg-core
          xinit
          openbox
          plank
          epiphany-browser
          pulseaudio
          calamares
          EOF

      - name: Compile the Operating System
        run: |
          cd build-env
          sudo lb build

      - name: Rename Artifact
        run: |
          cd build-env
          # Standardize the output ISO filename for upload
          mv live-image-amd64.hybrid.iso studentos-amd64.iso || mv live-image-amd64.iso studentos-amd64.iso || true

      - name: Upload the Finished ISO
        uses: actions/upload-artifact@v4
        with:
          name: studentos-amd64
          path: build-env/studentos-amd64.iso
