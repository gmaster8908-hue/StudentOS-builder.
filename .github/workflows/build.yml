name: Build StudentOS (Debootstrap Method)

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi mtools

      - name: Set up build directories
        run: |
          mkdir -p work/chroot
          mkdir -p work/iso/live
          mkdir -p work/iso/boot/grub

      - name: Bootstrap Debian 12 (Bookworm)
        run: |
          sudo debootstrap --arch=amd64 bookworm work/chroot http://deb.debian.org/debian/

      - name: Mount virtual filesystems
        run: |
          sudo mount --bind /dev work/chroot/dev
          sudo mount -t proc proc work/chroot/proc
          sudo mount -t sysfs sysfs work/chroot/sys
          sudo mount -t devpts devpts work/chroot/dev/pts

      - name: Install StudentOS Software & Configure Autologin
        run: |
          sudo chroot work/chroot /bin/bash -c "
            apt-get update
            
            # Install the Core UI Stack, your apps, and nodm for autologin
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              linux-image-amd64 \
              live-boot \
              systemd-sysv \
              network-manager \
              xserver-xorg-core \
              xinit \
              openbox \
              nodm \
              plank \
              epiphany-browser \
              nano \
              calamares \
              pulseaudio

            # Configure nodm to automatically log in the default live 'user'
            echo 'NODM_ENABLED=true' > /etc/default/nodm
            echo 'NODM_USER=user' >> /etc/default/nodm
            echo 'NODM_XINIT=/usr/bin/xinit' >> /etc/default/nodm
            echo 'NODM_FIRST_VT=7' >> /etc/default/nodm

            # Tell Xinit to launch Openbox automatically when the user logs in
            mkdir -p /etc/skel
            echo 'exec openbox-session' > /etc/skel/.xinitrc

            # Create the default live user
            useradd -m -s /bin/bash user
            echo 'user:live' | chpasswd
            usermod -aG sudo user

            # Clean up downloaded packages to keep the ISO small
            apt-get clean
          "

      - name: Unmount virtual filesystems
        run: |
          sudo umount work/chroot/dev/pts
          sudo umount work/chroot/sys
          sudo umount work/chroot/proc
          sudo umount work/chroot/dev

      - name: Copy kernel and initrd
        run: |
          cp work/chroot/boot/vmlinuz-* work/iso/live/vmlinuz
          cp work/chroot/boot/initrd.img-* work/iso/live/initrd

      - name: Create SquashFS
        run: |
          sudo mksquashfs work/chroot work/iso/live/filesystem.squashfs -comp xz

      - name: Create GRUB Boot Menu Configuration
        run: |
          cat << 'EOF' > work/iso/boot/grub/grub.cfg
          set default="0"
          set timeout=5

          menuentry "Start StudentOS" {
              linux /live/vmlinuz boot=live quiet splash
              initrd /live/initrd
          }
          EOF

      - name: Build the ISO
        run: |
          grub-mkrescue -o studentos-amd64.iso work/iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: studentos-amd64
          path: studentos-amd64.iso
